<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Denied — SecureAuth</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav>
    <a class="brand" href="/">🔐 SecureAuth</a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>
  <div class="container">
    <div class="card text-center" style="margin-top:4rem;">
      <div style="font-size:4rem; margin-bottom:1rem;">🚫</div>
      <h1>Access Denied</h1>
      <div class="alert alert-error" style="margin-top:1.5rem;">{{message}}</div>
      <div class="mt-3">
        <a href="/dashboard" class="link">← Back to Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
