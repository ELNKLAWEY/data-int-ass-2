<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2FA Verification — SecureAuth</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav>
    <a class="brand" href="/">🔐 SecureAuth</a>
  </nav>
  <div class="container">
    <div class="card text-center">
      <div style="font-size:3rem; margin-bottom:0.5rem;">🔑</div>
      <h1>Two-Factor Authentication</h1>
      <p style="color:#94a3b8; margin-bottom:1.5rem;">Open your authenticator app and enter the 6-digit code.</p>
      {{#if error}}
      <div class="alert alert-error">{{error}}</div>
      {{/if}}
      <form method="POST" action="/verify-2fa">
        <input type="hidden" name="userId" value="{{userId}}"/>
        <div class="form-group">
          <input type="text" name="token" placeholder="000000" maxlength="6" pattern="\d{6}" required
                 style="text-align:center; font-size:2rem; letter-spacing:0.8rem;" autofocus/>
        </div>
        <button type="submit" class="btn btn-primary">Verify Code</button>
      </form>
      <p class="mt-2"><a href="/login" class="link">← Back to Login</a></p>
    </div>
  </div>
</body>
</html>
