<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SecureAuth</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav>
    <a class="brand" href="/">🔐 SecureAuth</a>
    <div class="nav-links">
      <a href="/login">Login</a>
    </div>
  </nav>
  <div class="container">
    <div class="card">
      <h1>Create Account</h1>
      {{#if error}}
      <div class="alert alert-error">{{error}}</div>
      {{/if}}
      <form method="POST" action="/register">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="john@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Minimum 8 characters" minlength="8" required/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role" required>
            <option value="">— Select Role —</option>
            <option value="user">User</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
      <p class="text-center mt-2">
        Already have an account? <a href="/login" class="link">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
