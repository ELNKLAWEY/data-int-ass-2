<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Area — SecureAuth</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <nav>
    <a class="brand" href="/">🔐 SecureAuth</a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/profile">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>
  <div class="container">
    <div class="card" style="margin-top:2rem;">
      <h1>👤 My Area</h1>
      <p style="color:#94a3b8; margin-bottom:1.5rem;">
        Welcome, {{user.name}} — <span class="badge badge-user">user</span>
      </p>

      <div class="role-section">
        <h3>Your Access</h3>
        <ul class="perm-list">
          <li>View and edit your personal profile</li>
          <li>Update your preferences</li>
          <li>View your activity history</li>
          <li>Manage your account settings</li>
        </ul>
      </div>

      <div class="info-grid" style="margin-top:1.5rem;">
        <div class="info-item">
          <div class="label">Account Status</div>
          <div class="value" style="color:#22c55e;">Active</div>
        </div>
        <div class="info-item">
          <div class="label">Security</div>
          <div class="value" style="color:#22c55e;">✓ 2FA On</div>
        </div>
      </div>

      <div class="mt-3">
        <a href="/profile" class="link">→ View Full Profile</a>
      </div>
    </div>
  </div>
</body>
</html>
